# Render Blueprint - SkillTen / VIYA AI
# Deploy both backend and frontend from one repo
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─── Backend API (FastAPI + Supabase PostgreSQL) ───
  - type: web
    name: viya-api
    runtime: python
    region: singapore  # Closest to India for low latency
    plan: free         # Free tier: 750 hrs/month, sleeps after 15 min idle
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false  # Set Supabase PostgreSQL URL in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ENV
        value: production

  # ─── Frontend (Next.js) ───
  - type: web
    name: viya-web
    runtime: node
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: viya-api
          type: web
          property: host
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false  # Set in Render dashboard
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false  # Set in Render dashboard
      - key: NODE_VERSION
        value: "20.11.0"
